version: 2
updates:
  - package-ecosystem: pip
    directory: /projects/verifiable-shuffle
    schedule:
      interval: monthly
    groups:
      minor-and-patch:
        exclude-patterns:
          # Even when this is a minor or patch bump, it still causes the artifacts to change.
          # In order to keep manual intervention on PRs to a minimum (commit new artifacts),
          #  we are going to have puyapy updates through separate PRs.
          - "puyapy"
        update-types:
          - minor
          - patch
      security-patches:
        patterns:
          - "*"
        applies-to: security-updates
  - package-ecosystem: npm
    directory: /projects/verifiable-shuffle-frontend
    schedule:
      interval: monthly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      security-patches:
        patterns:
          - "*"
        applies-to: security-updates
